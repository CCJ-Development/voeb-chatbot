# Docker Compose Override for VÖB Extension Framework
# Mounts backend/ext/ into containers so ext code is available at runtime.
#
# Usage (Dev):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.voeb.yml up -d
#
# Or set COMPOSE_FILE environment variable:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml:docker-compose.voeb.yml
#   docker compose up -d

services:
  api_server:
    volumes:
      - ../../backend/ext:/app/ext
      - ../../backend/onyx/main.py:/app/onyx/main.py:ro
      - ../../backend/onyx/llm/multi_llm.py:/app/onyx/llm/multi_llm.py:ro
      - ../../backend/onyx/chat/prompt_utils.py:/app/onyx/chat/prompt_utils.py:ro
      - ../../backend/alembic:/app/alembic
    env_file:
      - path: .env
        required: false

  background:
    volumes:
      - ../../backend/ext:/app/ext
      - ../../backend/onyx/llm/multi_llm.py:/app/onyx/llm/multi_llm.py:ro
      - ../../backend/onyx/chat/prompt_utils.py:/app/onyx/chat/prompt_utils.py:ro
    env_file:
      - path: .env
        required: false

  web_server:
    build:
      args:
        - NEXT_PUBLIC_EXT_I18N_ENABLED=${NEXT_PUBLIC_EXT_I18N_ENABLED:-}
        - NEXT_PUBLIC_EXT_RBAC_ENABLED=${NEXT_PUBLIC_EXT_RBAC_ENABLED:-}

  # OpenSearch: JVM Heap fuer lokale Entwicklung reduzieren.
  # Upstream-Default 2g ist zu viel fuer Docker Desktop (7.6 GiB gesamt).
  # 512m reicht fuer lokales Testing mit wenig Daten.
  opensearch:
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
