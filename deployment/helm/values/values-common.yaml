# ===========================================================
# VÖB Service Chatbot — Gemeinsame Helm Values
# ===========================================================
# Gilt für ALLE Environments (dev, test, prod).
# Environment-spezifische Overrides in values-{env}.yaml
#
# Usage:
#   helm upgrade --install onyx-dev deployment/helm/charts/onyx \
#     -f deployment/helm/values/values-common.yaml \
#     -f deployment/helm/values/values-dev.yaml \
#     --namespace onyx-dev
# ===========================================================

global:
  pullPolicy: IfNotPresent
  host: "0.0.0.0"

# --- Container Images: StackIT Registry ---
# Alle Custom-Images (Backend, Frontend, Celery) kommen aus der StackIT Registry.
# Tag wird über global.version in values-{env}.yaml gesetzt (default: "latest").
# Model Server + Vespa + Redis + OpenSearch nutzen Upstream-Images (Docker Hub).
api:
  image:
    repository: registry.onstackit.cloud/voeb-chatbot/onyx-backend
  # --- Health Probes ---
  # /health ist PUBLIC_ENDPOINT (keine Auth), existiert bereits in Onyx FOSS.
  # Konservative Timeouts: Pod wird erst nach 5 Fehlschlägen (75s) neugestartet.
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 5
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 8
    timeoutSeconds: 5

webserver:
  image:
    repository: registry.onstackit.cloud/voeb-chatbot/onyx-web-server
  # --- Health Probes ---
  # Next.js hat keinen eigenen /health Endpoint. /api/* Proxy laeuft ueber NGINX Ingress,
  # nicht ueber Next.js intern. Daher TCP Socket Probe: prueft ob Next.js auf Port 3000 lebt.
  # HTTP Probe auf / waere moeglich (307→200), aber bei Kaltstart zu langsam (SSR-Kompilierung).
  readinessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 5
  livenessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 5
    timeoutSeconds: 5

# --- PostgreSQL: DEAKTIVIERT ---
# Wir nutzen StackIT Managed PostgreSQL Flex (extern).
# Connection-Details kommen per Environment-Values.
postgresql:
  enabled: false

# --- MinIO: DEAKTIVIERT ---
# Wir nutzen StackIT Object Storage (S3-kompatibel, extern).
minio:
  enabled: false

# --- OpenSearch: AKTIVIERT (Upstream-Default seit v3.0.0) ---
# Chart-Default opensearch.enabled=true greift. Subchart deployed OpenSearch 3.4.0.
# Ressourcen-Overrides pro Environment in values-{env}.yaml.
# Retrieval: Nach Deployment per Admin UI auf OpenSearch umschalten (einmalig).

# --- Auth: OpenSearch Secret AKTIVIERT ---
# Chart-Default Passwort "OnyxDev1!" (intern, kein externer Zugang).
# PROD: Sicheres Passwort per GitHub Secret + --set im CI/CD.
auth:
  opensearch:
    enabled: true

# --- Vespa: MINIMAL (Zombie-Mode) ---
# v3.x Code erfordert laufenden Vespa-Pod fuer Celery Readiness Check
# (wait_for_vespa_or_shutdown in app_base.py:517). Ohne Vespa-Pod crashen alle Worker.
# Minimale Ressourcen: Nur fuer Health-Endpoint, kein produktiver Einsatz.
# Bei Upstream v4.0.0: Vespa komplett entfernen (Code-seitig entfernt).
vespa:
  enabled: true
  image:
    repository: vespa
    tag: "8.609.39"
  securityContext:
    privileged: false
    runAsUser: 0

# --- Redis: IN-CLUSTER ---
redis:
  enabled: true
  redisStandalone:
    tag: "v7.0.15"

# --- Ingress Controller ---
nginx:
  enabled: true
  controller:
    config:
      # XREF-007: Upload-Limit 20 MB (Kickoff-Beschluss, DoS-Schutz).
      # Setzt client_max_body_size fuer ALLE Ingress-gerouteten Requests.
      # NGINX Ingress Controller Default waere 1m — wir setzen explizit 20m
      # damit File-Uploads (Dokumente fuer Knowledge Base) funktionieren.
      # Gilt fuer alle Umgebungen (DEV, TEST, PROD).
      proxy-body-size: "20m"
      http-snippet: |
        # Security Headers (BSI TR-02102 / VÖB Enterprise)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS: Downgrade-Angriffe verhindern (BSI TR-02102). max-age=3600 (1h) für DEV/TEST.
        # Für PROD auf 31536000 (1 Jahr) erhöhen.
        add_header Strict-Transport-Security "max-age=3600; includeSubDomains" always;
        # SEC-09: Request-Rate-Limiting (DoS + LLM-Kosten-Schutz).
        # 10 r/s pro IP = 600 r/min. Konservativ fuer 150-User Chatbot.
        # Normaler Chat: ~2-5 r/s bei Page-Load-Burst, ~0.5 r/s bei Chat.
        # Zone: 10 MB Shared Memory (~160.000 IPs trackbar).
        limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=10r/s;
        # Onyx custom config
        include /etc/nginx/custom-snippets/upstreams.conf;
        include /etc/nginx/custom-snippets/server.conf;
      # SEC-09: Rate-Limiting auf Server-Ebene anwenden.
      # burst=50: Erlaubt Bursts (Page-Load ~20 parallele API-Calls). nodelay: Burst-Requests
      # werden sofort bedient (kein Queuing). Ueber 10r/s + 50 burst = HTTP 429.
      server-snippet: |
        limit_req zone=ratelimit burst=50 nodelay;
        limit_req_status 429;
    service:
      type: LoadBalancer
      # SEC-09: Client-IP Erhaltung fuer per-IP Rate-Limiting.
      # Ohne "Local" setzt Kubernetes SNAT ein und $binary_remote_addr zeigt die
      # interne Node-IP statt der echten Client-IP. Damit wuerden ALLE User
      # ein einziges Rate-Limit teilen (10 r/s global statt pro Client).
      # "Local" leitet Traffic nur an Nodes mit NGINX-Pod weiter und erhalt die Quell-IP.
      # Bei 1 NGINX-Pod aendert sich am Routing nichts — aller Traffic geht sowieso
      # zu einem einzigen Pod. Kubernetes Standard-Empfehlung fuer Ingress Controller.
      externalTrafficPolicy: Local

# --- Bots: DEAKTIVIERT ---
slackbot:
  enabled: false
discordbot:
  enabled: false

# --- Optionale Features: DEAKTIVIERT ---
codeInterpreter:
  enabled: false
mcpServer:
  enabled: false

# --- SEC-06: Container Security Hardening (2026-03-08) ---
# Onyx Chart Default: privileged: true + runAsUser: 0 für Celery + Model Server.
# Phase 1: privileged entfernt. runAsUser: 0 beibehalten (minimale Änderung).
# Phase 2 (vor PROD): runAsUser: 1001 + runAsNonRoot: true (Onyx Dockerfile definiert User 'onyx' UID 1001).
# BSI SYS.1.6.A10: "Privileged Mode SOLLTE NICHT verwendet werden."
celery_shared:
  image:
    repository: registry.onstackit.cloud/voeb-chatbot/onyx-backend
  securityContext:
    privileged: false
    runAsUser: 0

inferenceCapability:
  image:
    repository: docker.io/onyxdotapp/onyx-model-server
    tag: "v2.9.8"
  securityContext:
    privileged: false
    runAsUser: 0

indexCapability:
  image:
    repository: docker.io/onyxdotapp/onyx-model-server
    tag: "v2.9.8"
  securityContext:
    privileged: false
    runAsUser: 0

# --- Gemeinsame Konfiguration ---
configMap:
  DISABLE_TELEMETRY: "true"
  # KRITISCH: LICENSE_ENFORCEMENT_ENABLED hat Default "true" in Onyx FOSS.
  # Das aktiviert EE-Code-Pfade (onyx.server.tenants etc.) die wir nicht haben.
  # Muss explizit auf "false" gesetzt werden.
  LICENSE_ENFORCEMENT_ENABLED: "false"
  # "Powered by Onyx" im Header entfernen (Whitelabel)
  # Hinweis: Auch als build-arg in stackit-deploy.yml definiert (Next.js NEXT_PUBLIC_* = Build-Zeit)
  NEXT_PUBLIC_DO_NOT_USE_TOGGLE_OFF_DANSWER_POWERED: "true"
  # --- VÖB Extension Framework ---
  # Feature Flags für Custom Extensions (backend/ext/ + web/src/ext/)
  EXT_ENABLED: "true"
  EXT_BRANDING_ENABLED: "true"
  EXT_I18N_ENABLED: "true"
  # OpenSearch: AKTIVIERT (Upstream-Default seit v3.0.0).
  # OPENSEARCH_HOST, ENABLE_OPENSEARCH_INDEXING_FOR_ONYX etc. werden automatisch
  # vom Chart-Template gesetzt wenn opensearch.enabled=true (configmap.yaml:15-20).
  # Retrieval-Umschaltung: Per Admin UI (DB-Flag), nicht per Env Var.
  # XREF-007 Defense-in-Depth: Backend-Limit auf 20 MB (= Ingress proxy-body-size).
  # Onyx Default: 2 GB. Bei Pod-zu-Pod-Traffic wuerde das Ingress-Limit umgangen.
  # 20 MB = 20 * 1024 * 1024 = 20971520 Bytes.
  MAX_FILE_SIZE_BYTES: "20971520"

# --- Image Pull Secret für StackIT Container Registry ---
imagePullSecrets:
  - name: stackit-registry
