# ===========================================================
# VÖB Service Chatbot — PROD Environment Helm Values
# ===========================================================
# PROD Environment Values — Infrastruktur provisioniert (2026-03-11).
# Cluster: vob-prod (2x g1a.8d), PG: Flex 4.8 HA (3-Node), S3: vob-prod.
#
# Vor dem ersten PROD-Deploy:
#   1. GitHub Environment "prod" mit Required Reviewers konfigurieren
#   2. GitHub Secrets fuer Environment "prod" anlegen
#   3. Namespace onyx-prod wird automatisch erstellt (--create-namespace im Workflow)
#   4. NetworkPolicies anwenden (deployment/k8s/network-policies/)
#
# Referenz: docs/referenz/stackit-infrastruktur.md (Zeilen 99-136)
# ===========================================================

global:
  version: "latest"

# --- Externe PostgreSQL (StackIT Flex 4.8 Replica — PROD, HA) ---
# Host kommt aus terraform output (environments/prod/).
# WICHTIG: PROD nutzt Flex 4.8 REPLICA (3-Node HA), nicht Single wie DEV/TEST.
auth:
  postgresql:
    enabled: true
    secretName: "onyx-postgresql"
    values:
      username: "onyx_app"
      password: ""  # → GitHub Secret POSTGRES_PASSWORD (Environment: prod)
  redis:
    enabled: true
    secretName: "onyx-redis"
    values:
      redis_password: ""  # → GitHub Secret REDIS_PASSWORD (Environment: prod)
  objectstorage:
    enabled: true
    secretName: "onyx-objectstorage"
    values:
      s3_aws_access_key_id: ""       # → GitHub Secret S3_ACCESS_KEY_ID
      s3_aws_secret_access_key: ""   # → GitHub Secret S3_SECRET_ACCESS_KEY
  dbreadonly:
    enabled: true
    secretName: "onyx-dbreadonly"
    values:
      db_readonly_user: "db_readonly_user"
      db_readonly_password: ""  # → GitHub Secret DB_READONLY_PASSWORD
  # Entra ID (OIDC) — Phase 3 PROD Rollout (2026-03-23)
  oauth:
    enabled: true
    secretName: "onyx-oauth"
    values:
      oauth_client_id: ""       # → GitHub Secret ENTRA_CLIENT_ID (Environment: prod)
      oauth_client_secret: ""   # → GitHub Secret ENTRA_CLIENT_SECRET (Environment: prod)
  userauth:
    enabled: true
    secretName: "onyx-userauth"
    values:
      user_auth_secret: ""      # → GitHub Secret USER_AUTH_SECRET (Environment: prod)

configMap:
  # PostgreSQL (StackIT Managed Flex 4.8 Replica — PROD, HA 3-Node)
  POSTGRES_HOST: "fdc7610c-91dc-4d0a-9652-adafe1a509cd.postgresql.eu01.onstackit.cloud"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "onyx"

  # Redis: Release-Name = Service-Name bei OT Redis Operator
  REDIS_HOST: "onyx-prod"

  # Object Storage (PROD-Bucket)
  S3_ENDPOINT_URL: "https://object.storage.eu01.onstackit.cloud"
  S3_FILE_STORE_BUCKET_NAME: "vob-prod"

  # Domain + TLS (HTTPS PFLICHT fuer PROD)
  # ⚠️ PFLICHT VOR ERSTEM DEPLOY:
  # 1. DNS A-Record: chatbot.voeb-service.de → <PROD-LB-IP>
  # 2. cert-manager + ClusterIssuer konfigurieren (Runbook: docs/runbooks/dns-tls-setup.md)
  # 3. Certificate-Ressource erstellen (ECDSA P-384, BSI-konform)
  DOMAIN: "chatbot.voeb-service.de"
  WEB_DOMAIN: "https://chatbot.voeb-service.de"

  # Auth: Entra ID (OIDC) — aktiviert 2026-03-23.
  # PKCE deaktiviert (Cookie-Loss durch NGINX Proxy, Lesson Learned DEV).
  AUTH_TYPE: "oidc"
  OIDC_PKCE_ENABLED: "false"
  REQUIRE_EMAIL_VERIFICATION: "false"

  # Logging: PROD weniger verbose
  LOG_LEVEL: "WARNING"

  # VÖB Extension Framework (EXT_ENABLED + EXT_BRANDING_ENABLED in values-common.yaml)
  # Config-Paritaet: TEST und PROD muessen identisch konfiguriert sein.
  # Begruendung: 12-Factor App Principle X (Dev/Prod Parity). Features die auf TEST getestet
  # und abgenommen sind, muessen auf PROD identisch aktiv sein. Abweichungen zwischen
  # Environments sind ein Deployment-Antipattern und fuehren zu "works on TEST"-Fehlern.
  EXT_TOKEN_LIMITS_ENABLED: "true"
  EXT_CUSTOM_PROMPTS_ENABLED: "true"
  EXT_DOC_ACCESS_ENABLED: "true"
  EXT_AUDIT_ENABLED: "true"
  EXT_ANALYTICS_ENABLED: "true"

# --- Celery Worker: PROD-Konfiguration (Standard Mode) ---
# Alle Worker aktiv (replicaCount: 1). Worker-Isolation ist Onyx Best Practice
# (Standard Mode seit Upstream PR #9014, nicht Lightweight Mode).
# Jeder Worker hat eine spezialisierte Aufgabe — 0 Replicas bedeutet Feature offline.
# Bei 150 erwarteten Usern sind alle Worker-Typen notwendig:
#   - light: OpenSearch/Vespa-Operationen, Permission-Sync, Deletion
#   - heavy: Document Pruning
#   - docfetching: Connector-Daten abholen
#   - docprocessing: Indexing Pipeline (Embed → OpenSearch + Vespa)
#   - monitoring: System Health Metriken (Celery Queues, Memory)
#   - user_file_processing: Benutzer-Uploads
# --- SEC-06 Phase 2: Non-Root Container (BSI SYS.1.6.A10) ---
# PROD laeuft von Tag 1 als non-root. Onyx Dockerfile definiert User 'onyx' UID 1001.
# Ueberschreibt values-common.yaml (Phase 1: privileged=false, runAsUser=0).
# Vespa bleibt root (runAsUser: 0) — Upstream-Limitation (vm.max_map_count).
# WICHTIG: Vor PROD-Deploy auf DEV/TEST validieren (E1)!
celery_shared:
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true

vespa:
  securityContext:
    privileged: false
    runAsUser: 0  # Dokumentierte Ausnahme: Vespa braucht root (Zombie-Mode, entfernen bei v4.0.0)

celery_beat:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_primary:
  replicaCount: 2  # HA: 2 Worker fuer Ausfallsicherheit
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_light:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_heavy:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_docfetching:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      # Optimierung 2026-04-17: 30d-Peak nur 224 MiB. 2 GiB = 9x Peak.
      # War 4 GiB (18x ueberprovisioniert). Spart 2 GiB fuer API-Server OOM-Fix.
      memory: 2Gi

celery_worker_docprocessing:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      # Optimierung 2026-04-17: 30d-Peak nur 225 MiB. 2 GiB = 9x Peak.
      memory: 2Gi

celery_worker_monitoring:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

celery_worker_user_file_processing:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# --- Ingress: HTTPS via NGINX Ingress Controller ---
# Enterprise Best Practice (BSI SYS.1.6): Netzwerkkonfiguration muss explizit und
# nachvollziehbar sein. Nie auf Chart-Defaults verlassen — jede Umgebung definiert
# ihren Ingress eigenstaendig. PROD auf eigenem Cluster (ADR-004), daher
# className "nginx" ohne Namenskonflikt (TEST nutzt "nginx-test" auf shared Cluster).
ingress:
  enabled: true
  className: "nginx"
  api:
    host: "chatbot.voeb-service.de"
  webserver:
    host: "chatbot.voeb-service.de"

# --- Nginx: PROD IngressClass + HSTS Override ---
# HSTS: BSI TR-02102 empfiehlt min. 6 Monate, OWASP empfiehlt 1 Jahr + includeSubDomains.
# PROD setzt max-age=31536000 (1 Jahr). DEV/TEST bleiben bei max-age=3600 (1h) aus
# values-common.yaml fuer Debugging-Flexibilitaet (z.B. HTTP-Fallback bei TLS-Problemen).
# Env-spezifischer Override statt Aenderung in values-common.yaml = Clean Architecture.
# Helm Deep Merge: http-snippet aus values-prod.yaml ueberschreibt values-common.yaml komplett.
nginx:
  enabled: true
  controller:
    config:
      # XREF-007: Upload-Limit 20 MB (Kickoff-Beschluss, DoS-Schutz).
      # Muss hier wiederholt werden weil values-prod.yaml nginx.controller.config
      # aus values-common.yaml beim Helm Deep Merge komplett ersetzt.
      proxy-body-size: "20m"
      http-snippet: |
        # Security Headers (BSI TR-02102 / VÖB Enterprise)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS: PROD = 1 Jahr (31536000s). BSI TR-02102: min. 6 Monate. OWASP: 1 Jahr.
        # includeSubDomains: Alle Subdomains erben HSTS (dev./test. sind andere Cluster).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # SEC-09: Request-Rate-Limiting (DoS + LLM-Kosten-Schutz).
        # Identisch mit values-common.yaml — muss hier wiederholt werden weil
        # Helm Deep Merge nginx.controller.config komplett ersetzt.
        limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=10r/s;
        # Onyx custom config
        include /etc/nginx/custom-snippets/upstreams.conf;
        include /etc/nginx/custom-snippets/server.conf;
      # SEC-09: Rate-Limiting auf Server-Ebene anwenden.
      server-snippet: |
        limit_req zone=ratelimit burst=50 nodelay;
        limit_req_status 429;
    ingressClassResource:
      name: "nginx"
      controllerValue: "k8s.io/ingress-nginx"
    ingressClass: "nginx"
    service:
      type: LoadBalancer
      # SEC-09: Client-IP Erhaltung (siehe Kommentar in values-common.yaml).
      externalTrafficPolicy: Local

# --- TLS ---
letsencrypt:
  enabled: false  # Eigener ClusterIssuer (DNS-01/Cloudflare), nicht Chart-Standard (HTTP-01)

# --- Backend API: HA ---
api:
  replicaCount: 2  # HA: Mindestens 2 Replicas
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      # OOM-Fix 2026-04-17: API-Server wurde bei grossen LLM-Requests (100k+ Tokens)
      # OOM-killed (Exit Code 137). Peak-Verbrauch ~1.5 GiB, Bursts ueber 2 GiB.
      # 30d-Peak laut Prometheus: 1514 MiB. 4 GiB gibt genug Headroom.
      memory: 4Gi

# --- Frontend: HA ---
webserver:
  replicaCount: 2  # HA: Mindestens 2 Replicas
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# --- OpenSearch: PROD (Upstream-Default seit v3.0.0) ---
# g1a.8d hat mehr Headroom als DEV/TEST (g1a.4d). Upstream-Defaults leicht reduziert.
opensearch:
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  opensearchJavaOpts: "-Xmx2g -Xms2g"
  persistence:
    size: 30Gi

# --- Vespa: ZOMBIE-MODE PROD (nur fuer Readiness Check) ---
# WICHTIG: Vespa Hard-Minimum 4Gi Memory-Check (cgroup Limit).
# Entfernen bei Upstream v4.0.0.
vespa:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: vespa-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi  # Immutable: PVC existiert bereits mit 50Gi

# --- Redis: PROD ---
redis:
  redisStandalone:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# --- Model Server: PROD ---
inferenceCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

indexCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
