# ===========================================================
# VÖB Service Chatbot — PROD Environment Helm Values
# ===========================================================
# PROD Environment Values — Infrastruktur provisioniert (2026-03-11).
# Cluster: vob-prod (2x g1a.8d), PG: Flex 4.8 HA (3-Node), S3: vob-prod.
#
# Vor dem ersten PROD-Deploy:
#   1. GitHub Environment "prod" mit Required Reviewers konfigurieren
#   2. GitHub Secrets fuer Environment "prod" anlegen
#   3. Namespace onyx-prod wird automatisch erstellt (--create-namespace im Workflow)
#   4. NetworkPolicies anwenden (deployment/k8s/network-policies/)
#
# Referenz: docs/referenz/stackit-infrastruktur.md (Zeilen 99-136)
# ===========================================================

global:
  version: "latest"

# --- Externe PostgreSQL (StackIT Flex 4.8 Replica — PROD, HA) ---
# Host kommt aus terraform output (environments/prod/).
# WICHTIG: PROD nutzt Flex 4.8 REPLICA (3-Node HA), nicht Single wie DEV/TEST.
auth:
  postgresql:
    enabled: true
    secretName: "onyx-postgresql"
    values:
      username: "onyx_app"
      password: ""  # → GitHub Secret POSTGRES_PASSWORD (Environment: prod)
  redis:
    enabled: true
    secretName: "onyx-redis"
    values:
      redis_password: ""  # → GitHub Secret REDIS_PASSWORD (Environment: prod)
  objectstorage:
    enabled: true
    secretName: "onyx-objectstorage"
    values:
      s3_aws_access_key_id: ""       # → GitHub Secret S3_ACCESS_KEY_ID
      s3_aws_secret_access_key: ""   # → GitHub Secret S3_SECRET_ACCESS_KEY
  dbreadonly:
    enabled: true
    secretName: "onyx-dbreadonly"
    values:
      db_readonly_user: "db_readonly_user"
      db_readonly_password: ""  # → GitHub Secret DB_READONLY_PASSWORD
  # Entra ID (OIDC) — Phase 3 PROD Rollout (2026-03-23)
  oauth:
    enabled: true
    secretName: "onyx-oauth"
    values:
      oauth_client_id: ""       # → GitHub Secret ENTRA_CLIENT_ID (Environment: prod)
      oauth_client_secret: ""   # → GitHub Secret ENTRA_CLIENT_SECRET (Environment: prod)
  userauth:
    enabled: true
    secretName: "onyx-userauth"
    values:
      user_auth_secret: ""      # → GitHub Secret USER_AUTH_SECRET (Environment: prod)

configMap:
  # PostgreSQL (StackIT Managed Flex 4.8 Replica — PROD, HA 3-Node)
  POSTGRES_HOST: "fdc7610c-91dc-4d0a-9652-adafe1a509cd.postgresql.eu01.onstackit.cloud"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "onyx"

  # Redis: Release-Name = Service-Name bei OT Redis Operator
  REDIS_HOST: "onyx-prod"

  # Object Storage (PROD-Bucket)
  S3_ENDPOINT_URL: "https://object.storage.eu01.onstackit.cloud"
  S3_FILE_STORE_BUCKET_NAME: "vob-prod"

  # Domain + TLS (HTTPS PFLICHT fuer PROD)
  # ⚠️ PFLICHT VOR ERSTEM DEPLOY:
  # 1. DNS A-Record: chatbot.voeb-service.de → <PROD-LB-IP>
  # 2. cert-manager + ClusterIssuer konfigurieren (Runbook: docs/runbooks/dns-tls-setup.md)
  # 3. Certificate-Ressource erstellen (ECDSA P-384, BSI-konform)
  DOMAIN: "chatbot.voeb-service.de"
  WEB_DOMAIN: "https://chatbot.voeb-service.de"

  # Auth: Entra ID (OIDC) — aktiviert 2026-03-23.
  # PKCE deaktiviert (Cookie-Loss durch NGINX Proxy, Lesson Learned DEV).
  AUTH_TYPE: "oidc"
  OIDC_PKCE_ENABLED: "false"
  REQUIRE_EMAIL_VERIFICATION: "false"

  # Logging: PROD weniger verbose
  LOG_LEVEL: "WARNING"

  # VÖB Extension Framework (EXT_ENABLED + EXT_BRANDING_ENABLED in values-common.yaml)
  # Config-Paritaet: TEST und PROD muessen identisch konfiguriert sein.
  # Begruendung: 12-Factor App Principle X (Dev/Prod Parity). Features die auf TEST getestet
  # und abgenommen sind, muessen auf PROD identisch aktiv sein. Abweichungen zwischen
  # Environments sind ein Deployment-Antipattern und fuehren zu "works on TEST"-Fehlern.
  EXT_TOKEN_LIMITS_ENABLED: "true"
  EXT_CUSTOM_PROMPTS_ENABLED: "true"
  EXT_DOC_ACCESS_ENABLED: "true"
  EXT_AUDIT_ENABLED: "true"
  EXT_ANALYTICS_ENABLED: "true"

# --- Celery Worker: PROD-Konfiguration (Standard Mode) ---
# Alle Worker aktiv (replicaCount: 1). Worker-Isolation ist Onyx Best Practice
# (Standard Mode seit Upstream PR #9014, nicht Lightweight Mode).
# Jeder Worker hat eine spezialisierte Aufgabe — 0 Replicas bedeutet Feature offline.
# Bei 150 erwarteten Usern sind alle Worker-Typen notwendig:
#   - light: OpenSearch/Vespa-Operationen, Permission-Sync, Deletion
#   - heavy: Document Pruning
#   - docfetching: Connector-Daten abholen
#   - docprocessing: Indexing Pipeline (Embed → OpenSearch + Vespa)
#   - monitoring: System Health Metriken (Celery Queues, Memory)
#   - user_file_processing: Benutzer-Uploads
# --- SEC-06 Phase 2: Non-Root Container (BSI SYS.1.6.A10) ---
# PROD laeuft von Tag 1 als non-root. Onyx Dockerfile definiert User 'onyx' UID 1001.
# Ueberschreibt values-common.yaml (Phase 1: privileged=false, runAsUser=0).
# Vespa-securityContext entfaellt seit Vespa-Disable (siehe values-common.yaml).
celery_shared:
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true

# --- Resource Rebalancing 2026-04-25 ---
# Basis: 30d-Peaks aus Prometheus PROD (max_over_time + 7d p95) bei realer Last
# (97 User, 1.476 Sessions/30d, 10.165 Messages/30d, 23.551 Chunks in OpenSearch).
# Voraussetzung fuer Node-Downgrade g1a.8d -> g1a.4d: Summe Requests < 7.400m CPU
# (= allocatable bei 2x g1a.4d). Vorher: 8.450m (passt nicht). Nachher: ~3.000m.
# Limits bleiben grosszuegig fuer Burst-Verhalten (kein OOM-Risiko).

celery_beat:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 320Mi   # 30d-Peak war 413 Mi (Outlier), p95 233 Mi. Headroom auf 320 Mi.
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_primary:
  replicaCount: 1  # Singleton by design: Redis-Lock erlaubt nur 1 aktiven Primary. Bei Pod-Crash startet K8s <30s nach. HA via Replicas ist unmoeglich.
  resources:
    requests:
      cpu: 200m       # 30d-Peak 91m, p95 26m. Reserve fuer Koordinations-Bursts.
      memory: 512Mi   # 30d-Peak 577 Mi, p95 312 Mi.
    limits:
      cpu: 1000m
      memory: 1Gi

celery_worker_light:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak 46m. Worker ist real Idle-dominiert.
      memory: 384Mi   # 30d-Peak 306 Mi.
    limits:
      cpu: 1000m
      memory: 1Gi

celery_worker_heavy:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m       # 30d-Peak 35m. Pruning laeuft selten, dafuer in Bursts.
      memory: 320Mi   # 30d-Peak 272 Mi.
    limits:
      cpu: 1000m
      memory: 1Gi

celery_worker_docfetching:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak Werktag 90m, p99 11m. Limit faengt Connector-Bursts.
      memory: 512Mi   # 30d-Peak nur 233 Mi — bei realen Connectors koennen PDFs RAM ziehen.
    limits:
      cpu: 1500m
      memory: 2Gi

celery_worker_docprocessing:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak Werktag 86m, p99 11m. Limit faengt Indexing-Bursts.
      memory: 512Mi   # 30d-Peak nur 232 Mi — Embedding-Batches koennen jedoch hoeher gehen.
    limits:
      cpu: 2000m
      memory: 2Gi

celery_worker_monitoring:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m        # 30d-Peak 31m, p95 13m.
      memory: 256Mi   # 30d-Peak 216 Mi.
    limits:
      cpu: 500m
      memory: 512Mi

celery_worker_user_file_processing:
  replicaCount: 1
  resources:
    requests:
      cpu: 200m       # 30d-Peak 400m war einmaliger Outlier, p95 14m. 200m als Burst-Reserve.
      memory: 768Mi   # 30d-Peak 978 Mi (echte User-Uploads). Hoechster Worker-RAM-Bedarf.
    limits:
      cpu: 1500m
      memory: 2Gi

# --- Ingress: HTTPS via NGINX Ingress Controller ---
# Enterprise Best Practice (BSI SYS.1.6): Netzwerkkonfiguration muss explizit und
# nachvollziehbar sein. Nie auf Chart-Defaults verlassen — jede Umgebung definiert
# ihren Ingress eigenstaendig. PROD auf eigenem Cluster (ADR-004), daher
# className "nginx" ohne Namenskonflikt (TEST nutzt "nginx-test" auf shared Cluster).
ingress:
  enabled: true
  className: "nginx"
  api:
    host: "chatbot.voeb-service.de"
  webserver:
    host: "chatbot.voeb-service.de"

# --- Nginx: PROD IngressClass + HSTS Override ---
# HSTS: BSI TR-02102 empfiehlt min. 6 Monate, OWASP empfiehlt 1 Jahr + includeSubDomains.
# PROD setzt max-age=31536000 (1 Jahr). DEV/TEST bleiben bei max-age=3600 (1h) aus
# values-common.yaml fuer Debugging-Flexibilitaet (z.B. HTTP-Fallback bei TLS-Problemen).
# Env-spezifischer Override statt Aenderung in values-common.yaml = Clean Architecture.
# Helm Deep Merge: http-snippet aus values-prod.yaml ueberschreibt values-common.yaml komplett.
nginx:
  enabled: true
  controller:
    config:
      # XREF-007: Upload-Limit 20 MB (Kickoff-Beschluss, DoS-Schutz).
      # Muss hier wiederholt werden weil values-prod.yaml nginx.controller.config
      # aus values-common.yaml beim Helm Deep Merge komplett ersetzt.
      proxy-body-size: "20m"
      http-snippet: |
        # Security Headers (BSI TR-02102 / VÖB Enterprise)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS: PROD = 1 Jahr (31536000s). BSI TR-02102: min. 6 Monate. OWASP: 1 Jahr.
        # includeSubDomains: Alle Subdomains erben HSTS (dev./test. sind andere Cluster).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # SEC-09: Request-Rate-Limiting (DoS + LLM-Kosten-Schutz).
        # Identisch mit values-common.yaml — muss hier wiederholt werden weil
        # Helm Deep Merge nginx.controller.config komplett ersetzt.
        # Scope: NUR /api/*. Seiten-Navigationen (Next.js RSC-Prefetch) bleiben unlimited,
        # siehe ausfuehrliche Begruendung in values-common.yaml.
        map $uri $ratelimit_key {
          default      "";
          "~^/api/"    $binary_remote_addr;
        }
        limit_req_zone $ratelimit_key zone=ratelimit:10m rate=10r/s;
        # Onyx custom config
        include /etc/nginx/custom-snippets/upstreams.conf;
        include /etc/nginx/custom-snippets/server.conf;
      # SEC-09: Rate-Limiting auf Server-Ebene anwenden.
      # Wirkt durch $ratelimit_key (map oben) nur auf /api/*.
      server-snippet: |
        limit_req zone=ratelimit burst=50 nodelay;
        limit_req_status 429;
    ingressClassResource:
      name: "nginx"
      controllerValue: "k8s.io/ingress-nginx"
    ingressClass: "nginx"
    service:
      type: LoadBalancer
      # SEC-09: Client-IP Erhaltung (siehe Kommentar in values-common.yaml).
      externalTrafficPolicy: Local

# --- TLS ---
letsencrypt:
  enabled: false  # Eigener ClusterIssuer (DNS-01/Cloudflare), nicht Chart-Standard (HTTP-01)

# --- Backend API: HA ---
api:
  replicaCount: 2  # HA: Mindestens 2 Replicas
  resources:
    requests:
      cpu: 200m       # Rebalanced 2026-04-25: 30d-Peak 1.245m war einmaliger Outlier, p95 87m.
      memory: 1Gi     # 30d-Peak 1.907 Mi, p95 1.528 Mi. 1 GiB Request gibt Scheduling-Reserve.
    limits:
      cpu: 1000m
      # OOM-Fix 2026-04-17 (verifiziert 2026-04-25 mit aktualisierten 30d-Daten):
      # 30d-Peak laut Prometheus: 1.907 MiB (vorher dokumentiert: 1.514 MiB).
      # 4 GiB Limit = 47% Auslastung am Peak — ausreichend Headroom fuer LLM-Bursts.
      memory: 4Gi

# --- Frontend: HA ---
webserver:
  replicaCount: 2  # HA: Mindestens 2 Replicas
  resources:
    requests:
      cpu: 100m       # 30d-Peak 133m, p95 4m. Next.js ist nach Build idle.
      memory: 192Mi   # 30d-Peak 137 Mi.
    limits:
      cpu: 500m
      memory: 1Gi

# --- OpenSearch: PROD (Upstream-Default seit v3.0.0) ---
# Rebalanced 2026-04-25: 30d-Peak RAM 3.469 Mi war 85 % vom alten 4 GiB Limit
# — zu eng fuer Indexing-Bursts. Limit auf 5 GiB hoch, Request auf 2,5 GiB.
# JavaOpts auf -Xmx3g angehoben (war 2g, OS-Heap sollte ~50% des Limits sein).
# 2026-04-26: CPU-Request 500m → 250m (Werktag-Peak 219m, p99 13m).
opensearch:
  resources:
    requests:
      cpu: 250m       # 30d-Peak Werktag 219m, p99 13m. Limit 2000m bleibt fuer Bursts.
      memory: 2560Mi  # 30d-Peak 3.469 Mi. Request schedule-freundlich, Limit faengt Peaks.
    limits:
      cpu: 2000m
      memory: 5Gi
  opensearchJavaOpts: "-Xmx3g -Xms3g"
  persistence:
    size: 30Gi

# Vespa entfaellt komplett: vespa.enabled=false in values-common.yaml,
# ONYX_DISABLE_VESPA=true in configMap, PVC + Service geloescht 2026-04-26,
# NetworkPolicy + Monitoring-Alert bereinigt.

# --- Redis: PROD ---
# Rebalanced 2026-04-25: 30d-Peak nur 40 Mi RAM, 7m CPU — bisher massiv ueberprovisioniert.
redis:
  redisStandalone:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# --- Redis-Operator: PROD ---
# Rebalanced 2026-04-26: Chart-Default war 500m/500Mi (=Limit), Live nur 4m/22 Mi.
# Faktor 100x ueberprovisioniert. Senkung auf 100m/128Mi gibt Headroom fuer
# Liveness-Probe-Spikes (timeoutSeconds=1s ist sehr aggressiv); Limit getrennt
# vom Request damit Bursts moeglich sind.
# HINWEIS: redis-operator ist eine eigene Helm-Release auf PROD (nicht Onyx-Sub-Chart).
# Werte werden via separatem `helm upgrade redis-operator -f <override>` deployed.
redisOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 500Mi

# --- Model Server: PROD ---
# Rebalanced 2026-04-25: Embedding/Inference-Calls gehen an StackIT AI Model Serving,
# lokaler Pod ist nur Proxy. 30d-Peak RAM 280 Mi, CPU 22m — sehr idle.
inferenceCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 2000m
      memory: 4Gi

indexCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  securityContext:
    privileged: false
    runAsUser: 1001
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 2000m
      memory: 4Gi
