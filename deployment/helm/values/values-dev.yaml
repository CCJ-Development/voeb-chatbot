# ===========================================================
# VÖB Service Chatbot — DEV Environment Helm Values
# ===========================================================
# 1 Replica pro Service, 8 separate Celery-Worker (Standard Mode)
# Shared Node Pool (devtest), kein Autoscaling
#
# PostgreSQL + Object Storage Credentials werden als
# K8s Secrets bereitgestellt (Terraform Output oder manuell).
# ===========================================================

global:
  version: "latest"

# --- Externe PostgreSQL (StackIT Flex 2.4 Single) ---
# Host/Port kommen nach terraform apply aus den Outputs.
# Bis dahin: Platzhalter, die beim Deploy überschrieben werden.
auth:
  postgresql:
    enabled: true
    secretName: "onyx-postgresql"
    values:
      username: "onyx_app"
      password: ""  # → Wird über values-dev-secrets.yaml gesetzt (gitignored)
  redis:
    enabled: true
    secretName: "onyx-redis"
    values:
      redis_password: ""  # → GitHub Secret REDIS_PASSWORD (per --set im Workflow)
  objectstorage:
    enabled: true
    secretName: "onyx-objectstorage"
    values:
      s3_aws_access_key_id: ""       # → values-dev-secrets.yaml
      s3_aws_secret_access_key: ""   # → values-dev-secrets.yaml
  dbreadonly:
    enabled: true
    secretName: "onyx-dbreadonly"
    values:
      db_readonly_user: "db_readonly_user"
      db_readonly_password: ""  # → GitHub Secret per --set im Workflow
  # --- Entra ID (OIDC) ---
  # Client ID + Client Secret werden als K8s Secret bereitgestellt.
  # Werte kommen per --set im CI/CD Workflow (GitHub Secrets).
  oauth:
    enabled: true
    secretName: "onyx-oauth"
    values:
      oauth_client_id: ""       # → GitHub Secret ENTRA_CLIENT_ID (per --set)
      oauth_client_secret: ""   # → GitHub Secret ENTRA_CLIENT_SECRET (per --set)
  # JWT Signing Secret für OIDC State Token (CSRF-Schutz)
  userauth:
    enabled: true
    secretName: "onyx-userauth"
    values:
      user_auth_secret: ""  # → GitHub Secret USER_AUTH_SECRET (per --set, openssl rand -hex 32)

configMap:
  # PostgreSQL (StackIT Managed Flex 2.4)
  POSTGRES_HOST: "be7fe911-4eac-4c9d-a7a8-6dfff674c41f.postgresql.eu01.onstackit.cloud"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "onyx"

  # Redis: Chart generiert "onyx-dev-master" (Bitnami), aber OT Redis Operator
  # erstellt Service als "onyx-dev". Muss explizit überschrieben werden.
  REDIS_HOST: "onyx-dev"

  # Object Storage
  S3_ENDPOINT_URL: "https://object.storage.eu01.onstackit.cloud"
  S3_FILE_STORE_BUCKET_NAME: "vob-dev"

  # Domain + TLS (HTTPS LIVE seit 2026-03-22, DNS korrekt auf 188.34.118.222)
  DOMAIN: "dev.chatbot.voeb-service.de"
  WEB_DOMAIN: "https://dev.chatbot.voeb-service.de"

  # Auth: Microsoft Entra ID (OIDC) — Phase 3
  # OPENID_CONFIG_URL wird per --set im CI/CD konstruiert (enthält Tenant ID aus GitHub Secret).
  # Redirect URI: https://dev.chatbot.voeb-service.de/auth/oidc/callback
  AUTH_TYPE: "oidc"
  OIDC_PKCE_ENABLED: "false"  # PKCE Cookie geht durch NGINX Proxy verloren, Client Secret reicht
  REQUIRE_EMAIL_VERIFICATION: "false"  # OIDC: Nicht relevant (Entra ID verifiziert)

  # VÖB Extension Framework (EXT_ENABLED + EXT_BRANDING_ENABLED in values-common.yaml)
  EXT_TOKEN_LIMITS_ENABLED: "true"
  EXT_CUSTOM_PROMPTS_ENABLED: "true"
  EXT_DOC_ACCESS_ENABLED: "true"
  EXT_AUDIT_ENABLED: "true"

  # Logging
  LOG_LEVEL: "INFO"

# --- Celery Worker: Standard Mode (8 separate Worker, ADR-005) ---
# Resource Rebalancing 2026-04-25: 30d-Peaks bei DEV-Idle-Last (1 Tester, 2 Sessions/30d, 0 Docs).
# DEV ist deutlich idler als PROD → Requests aggressiver gesenkt. Limits bleiben fuer Test-Bursts.
#
# Hinweis Single-Node-Pruefung 2026-04-25:
# Konsolidierung auf 1× g1a.4d wurde geprueft und VERWORFEN. Cluster-Total-Requests
# (onyx-dev 1.150m + monitoring 750m + kube-system 2.074m = ~3.974m CPU) liegen ueber
# der g1a.4d-Allocatable (~3.700m). Single-Node g1a.8d kostet identisch zu 2x g1a.4d
# (lineares vCPU-Pricing) und verliert HA. Empfehlung: 2x g1a.4d beibehalten.
celery_beat:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi   # 30d-Peak 357 Mi (Outlier), p95 ~200 Mi. Bleibt bei 256.
    limits:
      cpu: 250m
      memory: 512Mi

celery_worker_primary:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak 87m, p95 14m.
      memory: 384Mi   # 30d-Peak 476 Mi (Outlier), Live 311 Mi.
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_light:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m        # 30d-Peak 65m, p95 12m.
      memory: 320Mi   # 30d-Peak 315 Mi.
    limits:
      cpu: 1000m
      memory: 1Gi

celery_worker_heavy:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m        # 30d-Peak 60m, p95 12m.
      memory: 320Mi   # 30d-Peak 291 Mi.
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_docfetching:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak 66m, p95 12m. Reserve fuer Connector-Tests.
      memory: 320Mi   # 30d-Peak 250 Mi.
    limits:
      cpu: 500m
      memory: 2Gi

celery_worker_docprocessing:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak 68m, p95 11m. Reserve fuer Indexing-Tests.
      memory: 320Mi   # 30d-Peak 250 Mi.
    limits:
      cpu: 500m
      memory: 2Gi

celery_worker_monitoring:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi   # 30d-Peak 226 Mi.
    limits:
      cpu: 250m
      memory: 512Mi

celery_worker_user_file_processing:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m        # 30d-Peak 63m, p95 12m. DEV hat 0 Docs, kaum User-Uploads.
      memory: 320Mi   # 30d-Peak 254 Mi.
    limits:
      cpu: 500m
      memory: 1Gi

# --- TLS ---
letsencrypt:
  enabled: false  # Eigener ClusterIssuer (DNS-01 via Cloudflare), nicht Chart-eigener (HTTP-01)

# --- NGINX: values-common.yaml greift (HSTS max-age=3600, Security Headers, Rate-Limiting) ---
# HSTS-Override war temporaer noetig (2026-03-18 bis 2026-03-22) weil DNS auf alte LB-IP zeigte.
# DNS ist seit 2026-03-22 korrekt auf 188.34.118.222, HTTPS LIVE. Block entfernt.

# --- Ingress: NGINX Ingress Controller ---
ingress:
  enabled: true
  className: "nginx"
  api:
    host: "dev.chatbot.voeb-service.de"
  webserver:
    host: "dev.chatbot.voeb-service.de"

# --- Backend API: 1 Replica ---
api:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m       # 30d-Peak 289m war einmaliger Outlier, p95 5m. DEV-Idle.
      memory: 768Mi   # 30d-Peak 791 Mi (single Replica, kein HA-Bedarf).
    limits:
      cpu: 1000m
      memory: 2Gi     # DEV: 2 GiB reicht (PROD braucht 4 GiB wegen Multi-User-Last).

# --- Frontend: 1 Replica ---
webserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi   # 30d-Peak 98 Mi.
    limits:
      cpu: 250m
      memory: 512Mi

# --- OpenSearch: Upstream-Default seit v3.0.0 ---
# Rebalanced 2026-04-25: 30d-Peak 2.286 Mi fast am alten 3 GiB Limit (76 %) — leichte Erhoehung.
# DEV hat keine Doku-Last (0 Docs in DB), aber OS legt Audit-Indizes selbststaendig an.
opensearch:
  resources:
    requests:
      cpu: 200m       # 30d-Peak 10m, p95 6m.
      memory: 1792Mi  # War 1536Mi → Peak 2286 Mi laeuft drueber, Limit faengt es heute.
    limits:
      cpu: 1500m
      memory: 3Gi
  opensearchJavaOpts: "-Xmx1536m -Xms1536m"
  persistence:
    size: 20Gi

# Vespa-Block entfaellt: vespa.enabled=false in values-common.yaml.
# Aufraeumen DEV (eigenes Mini-Epic):
#   - PVC vespa-storage-da-vespa-0 loeschen (20 GiB, davon kaum belegt)
#   - Veraltete Doku-Kommentare entfernen

# --- Redis: Minimal ---
# Rebalanced 2026-04-25: 30d-Peak nur 30 Mi RAM. Schon vorher schlank, weiter senken nicht noetig.
# TODO: redis-operator hatte 5 Restarts in 39d auf DEV (zus. ~10 auf PROD in 44d).
# Gleiche Ursache wie PROD — bei separater Untersuchung mit pruefen.
redis:
  redisStandalone:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# --- Redis Operator: Requests senken (Chart Default 500m, Actual 5m) ---
redisOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 500Mi

# --- Model Server: 1 Replica, minimale Requests (DEV) ---
# Recreate-Strategie: Alter Pod wird gestoppt bevor neuer startet.
# Beibehalten nach g1a.8d Upgrade — eliminiert Port-Konflikte bei Model Servern.
inferenceCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 50m        # 30d-Peak 24m, p95 1m. Embedding-Calls gehen an StackIT AI.
      memory: 320Mi   # 30d-Peak 297 Mi.
    limits:
      cpu: 1000m
      memory: 2Gi

indexCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 50m        # 30d-Peak 23m, p95 1m.
      memory: 320Mi   # 30d-Peak 294 Mi.
    limits:
      cpu: 1000m
      memory: 2Gi
