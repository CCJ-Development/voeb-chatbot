# ===========================================================
# VÖB Service Chatbot — DEV Environment Helm Values
# ===========================================================
# 1 Replica pro Service, 8 separate Celery-Worker (Standard Mode)
# Shared Node Pool (devtest), kein Autoscaling
#
# PostgreSQL + Object Storage Credentials werden als
# K8s Secrets bereitgestellt (Terraform Output oder manuell).
# ===========================================================

global:
  version: "latest"

# --- Externe PostgreSQL (StackIT Flex 2.4 Single) ---
# Host/Port kommen nach terraform apply aus den Outputs.
# Bis dahin: Platzhalter, die beim Deploy überschrieben werden.
auth:
  postgresql:
    enabled: true
    secretName: "onyx-postgresql"
    values:
      username: "onyx_app"
      password: ""  # → Wird über values-dev-secrets.yaml gesetzt (gitignored)
  redis:
    enabled: true
    secretName: "onyx-redis"
    values:
      redis_password: ""  # → GitHub Secret REDIS_PASSWORD (per --set im Workflow)
  objectstorage:
    enabled: true
    secretName: "onyx-objectstorage"
    values:
      s3_aws_access_key_id: ""       # → values-dev-secrets.yaml
      s3_aws_secret_access_key: ""   # → values-dev-secrets.yaml
  dbreadonly:
    enabled: true
    secretName: "onyx-dbreadonly"
    values:
      db_readonly_user: "db_readonly_user"
      db_readonly_password: ""  # → GitHub Secret per --set im Workflow

configMap:
  # PostgreSQL (StackIT Managed Flex 2.4)
  POSTGRES_HOST: "be7fe911-4eac-4c9d-a7a8-6dfff674c41f.postgresql.eu01.onstackit.cloud"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "onyx"

  # Redis: Chart generiert "onyx-dev-master" (Bitnami), aber OT Redis Operator
  # erstellt Service als "onyx-dev". Muss explizit überschrieben werden.
  REDIS_HOST: "onyx-dev"

  # Object Storage
  S3_ENDPOINT_URL: "https://object.storage.eu01.onstackit.cloud"
  S3_FILE_STORE_BUCKET_NAME: "vob-dev"

  # Domain + TLS
  # TEMPORAER: HTTP statt HTTPS bis DNS A-Record auf neue LB-IP 188.34.118.222 zeigt.
  # DNS-Update angefragt bei Leif/GlobVill (2026-03-18).
  # Wenn DNS da: WEB_DOMAIN zurueck auf "https://dev.chatbot.voeb-service.de"
  DOMAIN: "dev.chatbot.voeb-service.de"
  WEB_DOMAIN: "http://dev.chatbot.voeb-service.de"

  # Auth: Basic Auth (Entra ID kommt in Phase 3)
  AUTH_TYPE: "basic"
  REQUIRE_EMAIL_VERIFICATION: "false"  # DEV: Kein SMTP konfiguriert

  # VÖB Extension Framework (EXT_ENABLED + EXT_BRANDING_ENABLED in values-common.yaml)
  EXT_TOKEN_LIMITS_ENABLED: "true"
  EXT_CUSTOM_PROMPTS_ENABLED: "true"

  # Logging
  LOG_LEVEL: "INFO"

# --- Celery Worker: Standard Mode (8 separate Worker, ADR-005) ---
celery_beat:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m   # Optimiert: Actual 13m, war 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

celery_worker_primary:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 12m, war 250m (21x over)
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_light:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 10m, war 250m (25x over)
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_heavy:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 10m, war 250m (25x over)
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

celery_worker_docfetching:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 10m, war 250m (25x over)
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 4Gi

celery_worker_docprocessing:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 10m, war 250m (25x over)
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 4Gi

celery_worker_monitoring:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m   # Optimiert: Actual 11m, war 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

celery_worker_user_file_processing:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 9m, war 250m (28x over)
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# --- TLS ---
letsencrypt:
  enabled: false  # Eigener ClusterIssuer (DNS-01 via Cloudflare), nicht Chart-eigener (HTTP-01)

# --- NGINX: HSTS TEMPORAER DEAKTIVIERT ---
# HSTS aus values-common.yaml (max-age=3600) erzwingt HTTPS im Browser.
# Solange DNS nicht auf die neue LB-IP 188.34.118.222 zeigt, muss DEV per HTTP laufen.
# Wenn DNS da: Diesen Block KOMPLETT ENTFERNEN (values-common.yaml greift dann).
nginx:
  controller:
    config:
      hsts: "false"
      hsts-max-age: "0"
      # Kopie von values-common.yaml http-snippet OHNE HSTS-Header.
      # ACHTUNG: Bei Aenderungen an common http-snippet muss dieser Block synchron bleiben!
      http-snippet: |
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS DEAKTIVIERT (DEV): DNS zeigt auf alte IP, HTTPS nicht moeglich.
        # add_header Strict-Transport-Security "max-age=3600; includeSubDomains" always;
        limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=10r/s;
        include /etc/nginx/custom-snippets/upstreams.conf;
        include /etc/nginx/custom-snippets/server.conf;

# --- Ingress: NGINX Ingress Controller ---
ingress:
  enabled: true
  className: "nginx"
  api:
    host: "dev.chatbot.voeb-service.de"
  webserver:
    host: "dev.chatbot.voeb-service.de"

# --- Backend API: 1 Replica ---
api:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 2m, war 250m (125x over)
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # nodeSelector: nicht nötig bei 1 Node Pool. Wird für PROD gesetzt.

# --- Frontend: 1 Replica ---
webserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m   # Optimiert: Actual 1m, war 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  # nodeSelector: nicht nötig bei 1 Node Pool. Wird für PROD gesetzt.

# --- OpenSearch: Upstream-Default seit v3.0.0 ---
# Ressourcen fuer g1a.4d angepasst (Upstream-Default 2000m/4Gi ist zu viel).
# JVM Heap = 50% vom RAM-Limit.
opensearch:
  resources:
    requests:
      cpu: 300m
      memory: 1536Mi
    limits:
      cpu: 1500m
      memory: 3Gi
  opensearchJavaOpts: "-Xmx1536m -Xms1536m"
  persistence:
    size: 20Gi

# --- Vespa: ZOMBIE-MODE (nur fuer Readiness Check) ---
# v3.x Code erfordert Vespa-Pod (app_base.py:517 wait_for_vespa_or_shutdown).
# Minimale Ressourcen: Health-Endpoint antworten, sonst nichts.
# WICHTIG: Vespa hat Hard-Minimum 4Gi Memory-Check (Container cgroup Limit).
# requests.memory=512Mi (Scheduling-Overhead gering), limits.memory=4Gi (Check bestanden).
# Entfernen bei Upstream v4.0.0 (Vespa wird dort Code-seitig entfernt).
vespa:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: vespa-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi  # Immutable: PVC existiert bereits mit 20Gi

# --- Redis: Minimal ---
redis:
  redisStandalone:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# --- Redis Operator: Requests senken (Chart Default 500m, Actual 5m) ---
redisOperator:
  resources:
    requests:
      cpu: 50m   # Optimiert: Actual 5m, Chart Default 500m (100x over)
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 500Mi

# --- Model Server: 1 Replica, minimale Requests (DEV) ---
# Recreate-Strategie: Alter Pod wird gestoppt bevor neuer startet.
# Beibehalten nach g1a.8d Upgrade — eliminiert Port-Konflikte bei Model Servern.
inferenceCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 1m, war 250m (250x over)
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  # nodeSelector: nicht nötig bei 1 Node Pool. Wird für PROD gesetzt.

indexCapability:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 150m  # Optimiert: Actual 2m, war 250m (125x over)
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  # nodeSelector: nicht nötig bei 1 Node Pool. Wird für PROD gesetzt.
