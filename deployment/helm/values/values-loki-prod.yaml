# ===========================================================
# VÖB Service Chatbot — Loki Log-Aggregation (PROD)
# ===========================================================
# Zentrales Log-Backend fuer alle PROD-Pods.
# Alle stdout/stderr-Logs werden persistent gespeichert (30d).
# Durchsuchbar in Grafana via LogQL.
#
# Chart: grafana/loki-stack 2.10.3 (Loki v2.9.3 + Promtail)
# Namespace: monitoring (gleicher NS wie Prometheus/Grafana)
#
# Install:
#   helm install loki grafana/loki-stack --version 2.10.3 \
#     -n monitoring -f deployment/helm/values/values-loki-prod.yaml
#
# Upgrade:
#   helm upgrade loki grafana/loki-stack --version 2.10.3 \
#     -n monitoring -f deployment/helm/values/values-loki-prod.yaml
#
# Referenz: audit-output/plan-logging-audit-2026-03-25.md (AP1)
# ===========================================================

# --- Test-Pod deaktivieren ---
test_pod:
  enabled: false

# --- Loki Server ---
loki:
  enabled: true
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    # storageClassName: default  # StackIT nutzt Default StorageClass

  resources:
    requests:
      cpu: 100m       # 2026-04-26: 30d-Peak nur 12m, Live 3m. Senkung zu g1a.4d-Pricetag.
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Retention: 30 Tage
  config:
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h  # 30 Tage

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: filesystem
      retention_enabled: true

    limits_config:
      retention_period: 720h  # 30 Tage
      max_entries_limit_per_query: 10000
      max_query_series: 500

    schema_config:
      configs:
        - from: "2026-03-25"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

  # Pod-Level SecurityContext (fsGroup fuer PVC-Zugriff)
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001

  replicas: 1  # Single-Instance reicht fuer 150 User

# --- Promtail (Log-Shipper, DaemonSet) ---
promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi

  # Nur Logs aus relevanten Namespaces sammeln
  config:
    logLevel: info
    clients:
      - url: http://loki:3100/loki/api/v1/push

    snippets:
      # Pipeline: Namespace-Filter + Pod-Labels als Loki-Labels
      pipelineStages:
        - cri: {}
        - drop:
            # kube-system Logs rausfiltern (zu viel Noise)
            source: namespace
            expression: "kube-system"

  # Tolerations fuer alle Nodes (DaemonSet muss ueberall laufen)
  tolerations:
    - operator: Exists

# --- Nicht benoetigte Komponenten deaktivieren ---
grafana:
  enabled: false  # Bereits deployed (kube-prometheus-stack)

prometheus:
  enabled: false  # Bereits deployed (kube-prometheus-stack)

fluent-bit:
  enabled: false

filebeat:
  enabled: false

logstash:
  enabled: false
