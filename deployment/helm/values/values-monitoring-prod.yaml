# ===========================================================
# VÖB Service Chatbot — Monitoring Stack Values (PROD)
# ===========================================================
# kube-prometheus-stack auf PROD-Cluster (vob-prod, eigener Cluster ADR-004)
# Ressourcen-Budget: ~1,3 vCPU Requests, ~2,1 Gi RAM Requests
#
# PROD-Cluster hat NUR onyx-prod (kein DEV/TEST).
# Daher eigene Values-Datei mit PROD-only Scrape Targets.
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f deployment/helm/values/values-monitoring-prod.yaml \
#     --set grafana.adminPassword=<PASSWORD>
#
# Upgrade:
#   helm upgrade monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring -f deployment/helm/values/values-monitoring-prod.yaml
#
# Zugang Grafana (nur kubectl port-forward):
#   kubectl port-forward -n monitoring svc/monitoring-grafana 3001:80
#
# Konzept: docs/referenz/monitoring-konzept.md
# ===========================================================

# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: 90d
    retentionSize: "40GB"
    scrapeInterval: "30s"
    resources:
      requests:
        cpu: 250m       # 30d-Peak Werktag 100m, p99 50m. Limit faengt Spitzen ab.
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Scrape Onyx API — jeden Pod einzeln (NICHT via Service!)
    # Service-Endpoint wuerde bei HA (2+ Pods) Round-Robin machen,
    # was Prometheus-Counter verfaelscht (oszillierende Werte → Phantom-Resets).
    additionalScrapeConfigs:
      - job_name: "onyx-api-prod"
        metrics_path: "/metrics"
        scrape_interval: "30s"
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["onyx-prod"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: onyx-prod-api-service
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: api-server-port
            action: keep
          - target_label: environment
            replacement: "prod"
          - target_label: service
            replacement: "api"
      # PostgreSQL Exporter (StackIT Managed PG Flex 4.8 Replica)
      - job_name: "postgres-prod"
        metrics_path: "/metrics"
        scrape_interval: "30s"
        scrape_timeout: "15s"
        static_configs:
          - targets: ["postgres-exporter-prod.monitoring.svc.cluster.local:9187"]
            labels:
              environment: "prod"
              service: "postgresql"
      # Redis Exporter (In-Cluster Redis)
      - job_name: "redis-prod"
        metrics_path: "/metrics"
        scrape_interval: "30s"
        static_configs:
          - targets: ["redis-exporter-prod.monitoring.svc.cluster.local:9121"]
            labels:
              environment: "prod"
              service: "redis"
      # Blackbox Exporter: PROD Health-Check (End-to-End, inkl. NGINX + TLS)
      - job_name: "blackbox-prod-health"
        metrics_path: "/probe"
        scrape_interval: "60s"
        scrape_timeout: "15s"
        params:
          module: ["http_2xx"]
        static_configs:
          # Phase 5 (2026-04-16): Von /api/health auf /api/ext/health/deep umgestellt.
          # /api/health ist blind (immer 200). /api/ext/health/deep testet DB+Redis+OpenSearch.
          - targets:
              - "https://chatbot.voeb-service.de/api/ext/health/deep"
            labels:
              environment: "prod"
              probe_type: "health"
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: "blackbox-exporter-prod.monitoring.svc.cluster.local:9115"
      # Blackbox Exporter: Externe Abhaengigkeiten
      - job_name: "blackbox-external-deps"
        metrics_path: "/probe"
        scrape_interval: "60s"
        scrape_timeout: "15s"
        params:
          module: ["http_any_response"]
        static_configs:
          - targets:
              - "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1/models"
            labels:
              environment: "prod"
              probe_type: "external"
              dependency: "stackit-llm"
          - targets:
              - "https://login.microsoftonline.com/8eac48f3-ba48-439b-b481-996c53f2cd1b/v2.0/.well-known/openid-configuration"
            labels:
              environment: "prod"
              probe_type: "external"
              dependency: "entra-id"
          - targets:
              - "https://object.storage.eu01.onstackit.cloud"
            labels:
              environment: "prod"
              probe_type: "external"
              dependency: "stackit-s3"
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: "blackbox-exporter-prod.monitoring.svc.cluster.local:9115"
      # OpenSearch Exporter (In-Cluster, elasticsearch-exporter v1.9.0)
      - job_name: "opensearch-prod"
        metrics_path: "/metrics"
        scrape_interval: "30s"
        static_configs:
          - targets: ["opensearch-exporter-prod.monitoring.svc.cluster.local:9114"]
            labels:
              environment: "prod"
              service: "opensearch"
    # ServiceMonitor Namespace Selector (alle Namespaces)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# --- Grafana ---
grafana:
  enabled: true
  adminPassword: ""  # Muss per --set gesetzt werden
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  # Kein Ingress — Zugriff per kubectl port-forward
  ingress:
    enabled: false
  persistence:
    enabled: false
  # Dashboard-Provisioning via Sidecar (ConfigMap-basiert, NICHT gnetId).
  # Dashboards werden als ConfigMaps mit Label grafana_dashboard=1 deployed.
  # Siehe: deployment/k8s/monitoring-exporters/grafana-dashboards/
  # 5 Dashboards: PG (14114), Redis (763), SLO, Audit-Log, Token-Usage.
  # gnetId-Approach funktioniert NICHT (Sidecar kann grafana.com nicht erreichen).
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folder: /var/lib/grafana/dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "sidecar"
          orgId: 1
          folder: "VÖB Chatbot"
          type: file
          disableDeletion: true
          editable: false
          options:
            path: /var/lib/grafana/dashboards

# --- AlertManager ---
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      # Alert Fatigue Fix (2026-04-16): Gleicher Alert postet sich nicht
      # mehr alle 1-4h erneut. Einmal bei Fire + einmal bei Resolve.
      # Backup: Externes Monitoring (UptimeRobot) als unabhaengige Sicht.
      repeat_interval: 24h
      receiver: "teams-prod"
      routes:
        - match:
            severity: critical
          repeat_interval: 4h
          receiver: "teams-prod"
        # info-Alerts: Nur in Grafana, NICHT in Teams (Alert Fatigue Praevention)
        - match:
            severity: info
          receiver: "null"
        # Watchdog Deadman Switch: Feuert dauerhaft (beabsichtigt), nicht in Teams
        - match:
            alertname: Watchdog
          receiver: "null"
        # InfoInhibitor: Internes Prometheus-Operator Konstrukt, nicht in Teams
        - match:
            alertname: InfoInhibitor
          receiver: "null"
    receivers:
      - name: "null"
      - name: "teams-prod"
        msteams_configs:
          # PROD: Separater Teams-Kanal (Webhook-URL hier eintragen)
          - webhook_url: "https://scale42ai.webhook.office.com/webhookb2/ae17ce3a-3647-4c8a-86f2-e0bd7b4703dc@a61ee147-68be-46ed-bc77-252610a484d5/IncomingWebhook/4a4dbe890f7442828999c10de1231aa9/98af9e43-092e-484a-b623-eaccbabbe80c/V2dHDcLlWC1kHa7tfeySkjhAUJwr8HTD8TSe7hpecDvTU1"
            title: '[PROD] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }} — {{ .Annotations.description }}{{ end }}'
            send_resolved: true

# --- kube-state-metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- node-exporter ---
prometheus-node-exporter:
  resources:
    requests:
      cpu: 150m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# --- prometheus-operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Unnoetige Komponenten deaktivieren ---
# Etcd, Scheduler, Controller-Manager, Proxy = StackIT-managed, kein Zugriff
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
# CoreDNS: StackIT-managed, kein Scrape-Zugriff auf kube-system
coreDns:
  enabled: false

# --- Alert Rules + Recording Rules ---
# Recording Rules: SLA/SLO Metriken fuer M1-Abnahme (2026-03-25).
# Alert Rules: 22 VÖB custom + 2 Backup-Check (PROD-only) + 1 SLO.
additionalPrometheusRulesMap:
  voeb-chatbot-alerts:
    groups:
      # --- SLA/SLO Recording Rules (M1-Abnahme) ---
      # Vorberechnete Metriken fuer Verfuegbarkeit, Latenz und Error Rate.
      # SLO-Ziele (mit VÖB abzustimmen):
      #   - Availability: 99.5% (monatlich, 3.6h Downtime erlaubt)
      #   - Latency P95: < 5s (API Response)
      #   - Error Rate: < 1% 5xx Responses
      - name: voeb-slo.rules
        rules:
          # Availability (5m Fenster, Probe-basiert)
          - record: voeb:api_availability:ratio_rate5m
            expr: avg_over_time(up{job="onyx-api-prod"}[5m])

          # Availability (24h rollierend)
          - record: voeb:api_availability:ratio_rate24h
            expr: avg_over_time(up{job="onyx-api-prod"}[24h])

          # Availability (30d rollierend — Haupt-SLO)
          - record: voeb:api_availability:ratio_rate30d
            expr: avg_over_time(up{job="onyx-api-prod"}[30d])

          # Error Rate (5m Fenster, nur 5xx)
          - record: voeb:api_error_rate:ratio_rate5m
            expr: |
              (
                sum(rate(http_requests_total{job="onyx-api-prod", status=~"5.."}[5m]))
                / sum(rate(http_requests_total{job="onyx-api-prod"}[5m]))
              ) or vector(0)

          # Error Rate (24h rollierend)
          - record: voeb:api_error_rate:ratio_rate24h
            expr: |
              (
                sum(rate(http_requests_total{job="onyx-api-prod", status=~"5.."}[24h]))
                / sum(rate(http_requests_total{job="onyx-api-prod"}[24h]))
              ) or vector(0)

          # Latency P50 (5m Fenster)
          - record: voeb:api_latency_p50:seconds
            expr: histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job="onyx-api-prod"}[5m])) by (le))

          # Latency P95 (5m Fenster)
          - record: voeb:api_latency_p95:seconds
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="onyx-api-prod"}[5m])) by (le))

          # Latency P99 (5m Fenster)
          - record: voeb:api_latency_p99:seconds
            expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="onyx-api-prod"}[5m])) by (le))

          # Request Rate (5m Fenster)
          - record: voeb:api_request_rate:per_second
            expr: sum(rate(http_requests_total{job="onyx-api-prod"}[5m]))

          # Error Budget verbleibend (30d, Ziel 99.5%)
          # 1.0 = volles Budget, 0.0 = Budget aufgebraucht, negativ = SLO verletzt
          - record: voeb:api_error_budget:remaining
            expr: 1 - ((1 - avg_over_time(up{job="onyx-api-prod"}[30d])) / (1 - 0.995))

      # --- SLO Alert ---
      - name: voeb-slo-alerts.rules
        rules:
          - alert: SLOAvailabilityBudgetLow
            expr: voeb:api_error_budget:remaining < 0.25
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "SLO Error Budget unter 25% ({{ $value | humanizePercentage }} verbleibend)"
              description: >-
                Die 30-Tage-Verfuegbarkeit naehert sich dem SLO-Ziel von 99.5%.
                Verbleibendes Error Budget: {{ $value | humanizePercentage }}.
                Bei 0% ist das SLO verletzt.

          - alert: SLOAvailabilityBreach
            expr: voeb:api_availability:ratio_rate30d < 0.995
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "SLO verletzt: Verfuegbarkeit unter 99.5% ({{ $value | humanizePercentage }})"
              description: >-
                Die 30-Tage-Verfuegbarkeit liegt bei {{ $value | humanizePercentage }},
                unter dem SLO-Ziel von 99.5%. Ursachenanalyse erforderlich.

          - alert: SLOLatencyBreach
            expr: voeb:api_latency_p95:seconds > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "SLO verletzt: P95 Latenz ueber 5s ({{ $value | printf \"%.2f\" }}s)"
              description: "API P95 Antwortzeit ueberschreitet das SLO-Ziel von 5 Sekunden."

      # --- Blackbox Probe Alerts (H3+H4, externe Abhaengigkeiten) ---
      - name: voeb-blackbox.rules
        rules:
          # PROD Health-Check (End-to-End)
          - alert: PRODHealthCheckFailed
            expr: probe_success{job="blackbox-prod-health"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "PROD Health-Check fehlgeschlagen ({{ $labels.instance }})"
              description: >-
                End-to-End Health-Check auf {{ $labels.instance }} schlaegt fehl.
                Pruefe NGINX, API, DNS und TLS.

          # Externe Abhaengigkeit nicht erreichbar
          - alert: ExternalDependencyDown
            expr: probe_success{job="blackbox-external-deps"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Externer Dienst nicht erreichbar: {{ $labels.dependency }}"
              description: >-
                Der externe Dienst {{ $labels.dependency }} ({{ $labels.instance }})
                antwortet seit 5 Minuten nicht. Bei LLM: Chat-Funktion betroffen.
                Bei Entra ID: Login betroffen. Bei S3: Datei-Uploads betroffen.

          # PROD TLS-Cert von aussen pruefen (Bonus zu S1 cert-manager)
          - alert: PRODCertExpiringSoonExternal
            expr: probe_ssl_earliest_cert_expiry{job="blackbox-prod-health"} - time() < 14 * 24 * 3600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "PROD TLS-Cert laeuft in weniger als 14 Tagen ab (extern geprueft)"
              description: "Verbleibend: {{ $value | humanizeDuration }}. Auto-Renewal pruefen."

          # Hohe Probe-Latenz (End-to-End langsam)
          - alert: PRODHighProbeLatency
            expr: probe_duration_seconds{job="blackbox-prod-health"} > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PROD End-to-End Latenz ueber 5s ({{ $value | printf \"%.2f\" }}s)"
              description: "Die gesamte Request-Dauer (DNS + TLS + HTTP) ist ungewoehnlich hoch."

      # --- OpenSearch Alerts (H2, Sprint 3) ---
      - name: voeb-opensearch.rules
        rules:
          - alert: OpenSearchClusterRed
            expr: elasticsearch_cluster_health_status{color="red",job="opensearch-prod"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "OpenSearch Cluster RED"
              description: "OpenSearch Cluster ist im RED-Status. Datenverlust moeglich."

          - alert: OpenSearchJVMHeapHigh
            expr: |
              elasticsearch_jvm_memory_used_bytes{area="heap",job="opensearch-prod"}
              / elasticsearch_jvm_memory_max_bytes{area="heap",job="opensearch-prod"} > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "OpenSearch JVM Heap ueber 85%"

          - alert: OpenSearchExporterDown
            expr: up{job="opensearch-prod"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "OpenSearch Exporter nicht erreichbar"

          # OpenSearchUnassignedShards: Bei Single-Node-Setup sind Replica-Shards
          # IMMER unassigned (erwartet, dokumentiert in voeb-projekt-status.md als
          # "Cluster yellow"). Threshold auf >20 gesetzt damit nur unerwartete
          # NEUE unassigned Shards (z.B. durch Index-Korruption) auffallen.
          # Alert Fatigue Fix 2026-04-16: War vorher >0, feuerte permanent.
          - alert: OpenSearchUnassignedShards
            expr: elasticsearch_cluster_health_unassigned_shards{job="opensearch-prod"} > 20
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "OpenSearch hat ungewoehnlich viele unassigned Shards ({{ $value }})"
              description: "Bei Single-Node sind einige unassigned normal. >20 deutet auf Index-Korruption oder neues Problem."

      # --- Security Alerts (M1, Sprint 3) ---
      - name: voeb-security.rules
        rules:
          - alert: HighAuthFailureRate
            expr: |
              sum(rate(http_requests_total{job="onyx-api-prod", handler=~"/auth/.*", status=~"4.."}[5m]))
              / sum(rate(http_requests_total{job="onyx-api-prod", handler=~"/auth/.*"}[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Auth-Fehlerrate ueber 50%"
              description: "Moeglicherweise Brute-Force oder OIDC-Problem."

          - alert: High403Rate
            expr: sum(rate(http_requests_total{job="onyx-api-prod", status="403"}[5m])) > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Hohe 403-Rate (>5/s seit 10min)"

          - alert: OIDCCallbackErrors
            expr: sum(rate(http_requests_total{job="onyx-api-prod", handler="/auth/oidc/callback", status=~"4..|5.."}[5m])) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "OIDC Callback Fehler (>0.1/s)"
              description: "Entra ID Callback schlaegt fehl. Token abgelaufen? Redirect URI?"

      # --- Token/Usage Alerts (ext-token Prometheus Counter) ---
      - name: voeb-token.rules
        rules:
          - alert: NoLLMTokenUsage
            expr: sum(rate(ext_token_requests_total[1h])) == 0
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Kein LLM-Token-Verbrauch seit 30min"
              description: "Kein einziger LLM-Request in der letzten Stunde. Modelle moeglicherweise nicht erreichbar."

          - alert: HighTokenUsageSpike
            expr: sum(rate(ext_token_prompt_total[5m])) > 1000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Ungewoehnlich hoher Token-Verbrauch (>1000 Tokens/s)"
              description: "Prompt-Token-Rate deutlich ueber Normal. Moeglicherweise Loop oder Missbrauch."

      - name: voeb-chatbot.rules
        rules:
          # 1. API nicht erreichbar
          - alert: APIDown
            expr: up{job=~"onyx-api.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Onyx API ist nicht erreichbar ({{ $labels.environment }})"
              description: "Der Scrape-Target {{ $labels.job }} antwortet seit 2 Minuten nicht."

          # 2. Pod restartet wiederholt
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"onyx-.*"}[1h]) > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} crashed wiederholt ({{ $labels.namespace }})"
              description: "{{ $labels.pod }} hat in der letzten Stunde >3 Restarts."

          # 3. Hohe Error-Rate (>5% Server Errors)
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Hohe HTTP 5xx Error-Rate ({{ $labels.environment }})"
              description: "Mehr als 5% aller Requests enden mit Server Error."

          # 4. DB Connection Pool Overflow
          - alert: DBPoolExhausted
            expr: onyx_db_pool_overflow > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "DB Connection Pool Overflow ({{ $labels.environment }})"
              description: "PostgreSQL Connection Pool nutzt Overflow-Connections seit 5 Minuten."

          # 5. Zu viele langsame Requests (>1/s ueber 10min)
          - alert: HighSlowRequests
            expr: rate(onyx_api_slow_requests_total[5m]) > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Hohe Slow-Request-Rate ({{ $labels.environment }})"
              description: "Mehr als 1 Slow Request pro Sekunde seit 10 Minuten (Threshold: {{ $value | printf \"%.2f\" }}/s)."

          # 6. Node Memory knapp (<10%)
          - alert: NodeMemoryPressure
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} hat weniger als 10% freien RAM"
              description: "Verfuegbar: {{ $value | humanizePercentage }}. Pods koennten OOM-killed werden."

          # 7. Node Disk knapp (<15%)
          - alert: NodeDiskPressure
            expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes < 0.15
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} hat weniger als 15% freien Disk"
              description: "Verfuegbar: {{ $value | humanizePercentage }}."

          # 8. OpenSearch PVC voll (<20%)
          # (Vespa-Alert entfiel 2026-04-26 — Vespa deaktiviert + PVCs geloescht)
          - alert: OpenSearchStorageFull
            expr: kubelet_volume_stats_available_bytes{persistentvolumeclaim=~"opensearch.*"} / kubelet_volume_stats_capacity_bytes < 0.2
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "[PROD] OpenSearch PVC fast voll ({{ $labels.namespace }})"
              description: "PVC {{ $labels.persistentvolumeclaim }} hat weniger als 20% freien Speicher."

          # 9. TLS-Zertifikat laeuft bald ab (<14 Tage)
          - alert: CertExpiringSoon
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "TLS-Zertifikat {{ $labels.name }} laeuft in weniger als 14 Tagen ab"
              description: "Namespace {{ $labels.namespace }}, verbleibend: {{ $value | humanizeDuration }}."

      # --- Exporter Alert Rules ---
      - name: voeb-exporter.rules
        rules:
          # 10. PG Exporter nicht erreichbar (Meta-Check: Exporter-Pod lebt nicht)
          - alert: PGExporterDown
            expr: up{job=~"postgres-.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL Exporter nicht erreichbar ({{ $labels.environment }})"
              description: "Scrape-Target {{ $labels.job }} antwortet seit 2 Minuten nicht."

          # 10b. PostgreSQL Instance nicht erreichbar (DB-Level-Check)
          # Alert Fatigue Fix 2026-04-16: pg_up ist die korrekte Metric.
          # up{job=~"postgres-.*"} prueft nur ob der Exporter-Pod scrapeable ist,
          # nicht ob die DB antwortet. Bei PG-Outage am 2026-04-15 war up=1
          # (Exporter lief) aber pg_up=0 (DB unerreichbar).
          - alert: PostgresDown
            expr: pg_up{job=~"postgres-.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL-Instance nicht erreichbar"
              description: "pg-exporter meldet keine DB-Verbindung. Connection refused oder Auth-Fehler. Siehe docs/runbooks/incident-pg-down.md"

          # 11. Redis Exporter nicht erreichbar
          - alert: RedisExporterDown
            expr: up{job=~"redis-.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis Exporter nicht erreichbar ({{ $labels.environment }})"
              description: "Scrape-Target {{ $labels.job }} antwortet seit 2 Minuten nicht."

          # 12. PG Connections >80% von max_connections
          - alert: PGConnectionsHigh
            expr: sum by (job,server)(pg_stat_database_numbackends{datname="onyx"}) > on(job,server) pg_settings_max_connections * 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL Connections >80% ({{ $labels.environment }})"
              description: "Aktive Backends: {{ $value }}. max_connections koennte bald erschoepft sein."

          # 13. PG Deadlocks (>5 in 5min)
          - alert: PGDeadlocks
            expr: increase(pg_stat_database_deadlocks{datname="onyx"}[5m]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL Deadlocks ({{ $labels.environment }})"
              description: "Mehr als 5 Deadlocks in den letzten 5 Minuten."

          # 14. PG Rollback-Rate >5% (nur bei genuegend Traffic, >10 tx/sec)
          - alert: PGHighRollbackRate
            expr: |
              (rate(pg_stat_database_xact_rollback{datname="onyx"}[5m]) / (rate(pg_stat_database_xact_rollback{datname="onyx"}[5m]) + rate(pg_stat_database_xact_commit{datname="onyx"}[5m])) > 0.05)
              and
              (rate(pg_stat_database_xact_rollback{datname="onyx"}[5m]) + rate(pg_stat_database_xact_commit{datname="onyx"}[5m]) > 10)
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL Rollback-Rate >5% ({{ $labels.environment }})"
              description: "Hohe Rollback-Rate: {{ $value | humanizePercentage }}."

          # 15. PG Database-Groesse >10 GB
          - alert: PGDatabaseGrowing
            expr: pg_database_size_bytes{datname="onyx"} > 10e9
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL DB >10 GB ({{ $labels.environment }})"
              description: "Aktuelle Groesse: {{ $value | humanize1024 }}B."

          # 16. Redis Memory >80% von maxmemory
          - alert: RedisMemoryHigh
            expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8 and on(instance) redis_memory_max_bytes > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis Memory >80% ({{ $labels.environment }})"
              description: "Verbrauch: {{ $value | humanizePercentage }}."

          # 17. Redis hohe Evictions
          - alert: RedisHighEvictions
            expr: increase(redis_evicted_keys_total[5m]) > 100
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis hohe Evictions ({{ $labels.environment }})"
              description: "Mehr als 100 Keys evicted in 5 Minuten."

          # 18. Redis Cache Hit Rate <80% (nur bei genuegend Traffic, >50 ops/sec)
          - alert: RedisCacheHitRateLow
            expr: |
              (rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.8)
              and
              (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]) > 50)
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Redis Cache Hit Rate <80% ({{ $labels.environment }})"
              description: "Hit Rate: {{ $value | humanizePercentage }}."

          # 19. Redis Rejected Connections (kritisch fuer Celery)
          - alert: RedisRejectedConnections
            expr: increase(redis_rejected_connections_total[5m]) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis lehnt Connections ab ({{ $labels.environment }})"
              description: "Celery-Worker koennten ausfallen."

          # 20. PG Cache Hit Ratio <90%
          - alert: PGCacheHitRateLow
            expr: rate(pg_stat_database_blks_hit{datname="onyx"}[5m]) / (rate(pg_stat_database_blks_hit{datname="onyx"}[5m]) + rate(pg_stat_database_blks_read{datname="onyx"}[5m])) < 0.9
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL Cache Hit Ratio <90% ({{ $labels.environment }})"
              description: "Hit Ratio: {{ $value | humanizePercentage }}. Shared Buffers koennte zu klein sein."

      # --- Backup Check Alert Rules (PROD-only, erfordert pg-backup-check CronJob) ---
      - name: voeb-backup-check.rules
        rules:
          # 21. Backup Check CronJob fehlgeschlagen
          # Feuert wenn ein AKTUELLER pg-backup-check CronJob fehlschlaegt (< 8h alt).
          # Fix 2026-03-25: Zeitfenster (28800s = 8h = 2 CronJob-Zyklen) eingefuehrt,
          # damit alte Failed-Jobs die in kube-state-metrics sichtbar bleiben nicht
          # dauerhaft feuern (vorher: 7x Critical/h Alert-Spam in Teams).
          # Ursachen: Backup zu alt, Backup-Fehler, API nicht erreichbar, Auth-Fehler.
          # Runbook: docs/runbooks/stackit-postgresql.md#pgbackupcheckfailed-alert
          - alert: PGBackupCheckFailed
            expr: |
              kube_job_status_failed{namespace="monitoring", job_name=~"pg-backup-check-.*"} > 0
              and on(job_name)
              kube_job_status_start_time{namespace="monitoring", job_name=~"pg-backup-check-.*"} > (time() - 28800)
              unless on(job_name)
              kube_job_status_succeeded{namespace="monitoring", job_name=~"pg-backup-check-.*"} > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL Backup Check fehlgeschlagen (PROD)"
              description: >-
                Der pg-backup-check CronJob ist fehlgeschlagen. Moegliche Ursachen:
                Backup zu alt (>26h), Backup-Fehler auf StackIT, API nicht erreichbar,
                oder Authentifizierung fehlgeschlagen. Logs pruefen:
                kubectl logs -n monitoring job/{{ $labels.job_name }}
              runbook_url: "https://github.com/CCJ-Development/voeb-chatbot/blob/main/docs/runbooks/stackit-postgresql.md"

          # 22. Backup Check CronJob nicht gelaufen
          # Feuert wenn der CronJob laenger als 6 Stunden nicht gescheduled wurde.
          # Ursachen: CronJob suspended, Cluster-Problem, Namespace-Problem.
          - alert: PGBackupCheckNotScheduled
            expr: |
              time() - kube_cronjob_status_last_schedule_time{namespace="monitoring", cronjob="pg-backup-check"} > 21600
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL Backup Check nicht gelaufen (PROD)"
              description: >-
                Der pg-backup-check CronJob wurde seit >6 Stunden nicht gescheduled.
                CronJob-Status pruefen: kubectl get cronjob pg-backup-check -n monitoring
