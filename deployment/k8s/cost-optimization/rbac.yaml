# ===========================================================
# RBAC: ServiceAccount fuer TEST Scale-to-Zero CronJobs
# ===========================================================
# Erlaubt dem scale-manager ServiceAccount, Deployments und
# StatefulSets im Namespace onyx-test zu skalieren.
#
# Apply:
#   kubectl apply -f deployment/k8s/cost-optimization/rbac.yaml
# ===========================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scale-manager
  namespace: onyx-test
  labels:
    app.kubernetes.io/part-of: voeb-cost-optimization
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scale-manager
  namespace: onyx-test
  labels:
    app.kubernetes.io/part-of: voeb-cost-optimization
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scale-manager
  namespace: onyx-test
  labels:
    app.kubernetes.io/part-of: voeb-cost-optimization
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scale-manager
subjects:
  - kind: ServiceAccount
    name: scale-manager
    namespace: onyx-test
