# ===========================================================
# CronJob: TEST Scale-Up (Mo-Fr 08:00 UTC)
# ===========================================================
# Skaliert alle Deployments und StatefulSets in onyx-test auf 1 Replica.
# Alle TEST-Komponenten haben replicaCount: 1 (values-test.yaml).
#
# HINWEIS: Wenn ein CI/CD Deploy (helm upgrade) laeuft waehrend TEST
# heruntergefahren ist, stellt Helm die korrekten Replicas automatisch her.
# Der CronJob ist nur fuer den regulaeren Tagesbetrieb noetig.
#
# Manuell testen:
#   kubectl create job --from=cronjob/test-scale-up test-scale-up-manual -n onyx-test
#
# Apply:
#   kubectl apply -f deployment/k8s/cost-optimization/test-scale-up.yaml
# ===========================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-scale-up
  namespace: onyx-test
  labels:
    app.kubernetes.io/part-of: voeb-cost-optimization
spec:
  schedule: "0 8 * * 1-5"  # Mo-Fr 08:00 UTC (10:00 MESZ / 09:00 MEZ)
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: scale-manager
          restartPolicy: OnFailure
          containers:
            - name: scale-up
              image: bitnami/kubectl:1.33
              command: ["/bin/bash", "-c"]
              args:
                - |
                  echo "$(date -u) — TEST Scale-Up gestartet"
                  NAMESPACE="onyx-test"
                  ERRORS=0

                  # Alle Deployments auf 1 Replica (TEST hat replicaCount: 1 fuer alles)
                  for DEPLOY in $(kubectl get deployments -n $NAMESPACE -o name 2>/dev/null); do
                    echo "  Scale up: $DEPLOY"
                    kubectl scale $DEPLOY --replicas=1 -n $NAMESPACE || ERRORS=$((ERRORS+1))
                  done

                  # Alle StatefulSets auf 1 Replica
                  for STS in $(kubectl get statefulsets -n $NAMESPACE -o name 2>/dev/null); do
                    echo "  Scale up: $STS"
                    kubectl scale $STS --replicas=1 -n $NAMESPACE || ERRORS=$((ERRORS+1))
                  done

                  # Warten bis Pods starten (max 3 Min)
                  echo "Warte auf Pod-Start..."
                  sleep 30
                  RUNNING=$(kubectl get pods -n $NAMESPACE --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
                  TOTAL=$(kubectl get pods -n $NAMESPACE --no-headers 2>/dev/null | wc -l)
                  echo "$(date -u) — Scale-Up abgeschlossen. Errors: $ERRORS, Pods: $RUNNING/$TOTAL Running"

                  if [ $ERRORS -gt 0 ]; then
                    echo "WARNUNG: $ERRORS Fehler beim Scale-Up"
                    exit 1
                  fi
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
