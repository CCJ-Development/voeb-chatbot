# postgres_exporter PROD — Metriken von StackIT Managed PG Flex 4.8 Replica (vob-prod)
# Erstellt: 2026-03-11 (PROD-Bereitstellung)
#
# Secret: pg-exporter-prod im monitoring-NS (PROD-Cluster).
# Manuell erstellen NACH terraform apply:
#   kubectl create secret generic pg-exporter-prod -n monitoring \
#     --from-literal=DATA_SOURCE_NAME="postgresql://db_readonly_user:<PASSWORD>@<PROD-PG-HOST>:5432/onyx?sslmode=require"
#
# Referenz: docs/technisches-feinkonzept/monitoring-exporter.md
# Hinweis: --no-collector.wal weil StackIT Managed PG nur login+createdb via Terraform erlaubt.
#          pg_ls_waldir() braucht pg_monitor Rolle die nicht verfuegbar ist.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-prod
  namespace: monitoring
  labels:
    app: postgres-exporter
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
      environment: prod
  template:
    metadata:
      labels:
        app: postgres-exporter
        environment: prod
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
          ports:
            - containerPort: 9187
              name: metrics
              protocol: TCP
          args:
            - "--no-collector.wal"   # pg_ls_waldir braucht pg_monitor (StackIT Managed PG)
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: pg-exporter-prod
                  key: DATA_SOURCE_NAME
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-prod
  namespace: monitoring
  labels:
    app: postgres-exporter
    environment: prod
spec:
  selector:
    app: postgres-exporter
    environment: prod
  ports:
    - port: 9187
      targetPort: metrics
      protocol: TCP
      name: metrics
