# Grafana Datasource: Loki
#
# Automatisches Provisioning via Grafana Sidecar.
# Label "grafana_datasource" wird vom Sidecar erkannt.
#
# Anwendung: kubectl apply -f grafana-datasource-loki.yaml -n monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/part-of: voeb-chatbot
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        jsonData:
          maxLines: 5000
        editable: false
