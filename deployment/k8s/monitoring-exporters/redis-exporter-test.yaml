# redis_exporter TEST — Metriken von In-Cluster Redis (onyx-test NS)
# Secret: redis-exporter-test im monitoring-NS (manuell erstellen, siehe docs/technisches-feinkonzept/monitoring-exporter.md)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter-test
  namespace: monitoring
  labels:
    app: redis-exporter
    environment: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
      environment: test
  template:
    metadata:
      labels:
        app: redis-exporter
        environment: test
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.82.0
          ports:
            - containerPort: 9121
              name: metrics
              protocol: TCP
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-test
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-test
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-test
  namespace: monitoring
  labels:
    app: redis-exporter
    environment: test
spec:
  selector:
    app: redis-exporter
    environment: test
  ports:
    - port: 9121
      targetPort: metrics
      protocol: TCP
      name: metrics
