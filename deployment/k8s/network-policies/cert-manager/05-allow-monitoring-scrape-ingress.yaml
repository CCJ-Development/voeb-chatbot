# Prometheus Scrape Ingress (Port 9402)
# Erlaubt Prometheus aus monitoring NS die Metriken abzuholen.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape-ingress
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    security.voeb/policy-type: allow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9402
          protocol: TCP
