# Webhook Admission Ingress (Port 443)
# K8s API Server ruft den cert-manager Webhook fuer Certificate-Validation.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    security.voeb/policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 443
          protocol: TCP
