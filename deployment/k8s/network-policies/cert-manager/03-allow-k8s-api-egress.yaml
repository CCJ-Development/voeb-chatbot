# K8s API Zugriff (CRDs, Secrets, Certificates)
# StackIT SKE: API Server ist EXTERN (nicht im Cluster), daher ipBlock statt
# namespaceSelector. Die alte Policy (namespaceSelector auf "default" namespace)
# blockierte den cainjector seit 2026-03-25 → CrashLoopBackOff mit 3623 Restarts.
# Fix: 2026-04-16.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-egress
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    security.voeb/policy-type: allow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 192.214.168.128/32
