# Zero-Trust Baseline: Default-Deny fuer cert-manager Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    security.voeb/policy-type: deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
