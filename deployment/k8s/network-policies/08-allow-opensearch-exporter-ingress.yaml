# NetworkPolicy: Allow OpenSearch Exporter Ingress — App Namespace
#
# Erlaubt dem OpenSearch Exporter (aus monitoring NS) Zugriff auf
# OpenSearch (Port 9200) im App-Namespace.
#
# Anwendung: kubectl apply -f 08-allow-opensearch-exporter-ingress.yaml -n onyx-prod

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opensearch-exporter-ingress
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    app.kubernetes.io/component: network-policy
    security.voeb/policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: opensearch-exporter
      ports:
        - port: 9200
          protocol: TCP
