# NetworkPolicy: Allow Blackbox Exporter HTTPS Egress — Monitoring Namespace
#
# Erlaubt dem Blackbox Exporter ausgehende HTTPS-Verbindungen (Port 443)
# zu externen Endpoints:
# - chatbot.voeb-service.de (PROD Health-Check)
# - api.openai-compat.model-serving.eu01.onstackit.cloud (StackIT LLM)
# - login.microsoftonline.com (Entra ID OIDC)
# - object.storage.eu01.onstackit.cloud (StackIT S3)
#
# Da die externen IPs dynamisch sind, erlauben wir Port 443 ohne IP-Restriktion.
# Der Blackbox Exporter hat nur Lesezugriff (GET Requests) und kein Secret-Material.
#
# Anwendung: kubectl apply -f 10-allow-blackbox-egress.yaml -n monitoring
# Referenz: audit-output/monitoring-erweiterungsplan-2026-03-25.md (H3+H4)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-blackbox-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    app.kubernetes.io/component: network-policy
    security.voeb/policy-type: allow
spec:
  podSelector:
    matchLabels:
      app: blackbox-exporter
  policyTypes:
    - Egress
  egress:
    # HTTPS zu externen Endpoints (Port 443)
    - ports:
        - port: 443
          protocol: TCP
