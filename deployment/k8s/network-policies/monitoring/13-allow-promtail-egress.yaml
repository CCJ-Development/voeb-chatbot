# NetworkPolicy: Allow Promtail Egress — Monitoring Namespace
#
# Erlaubt Promtail:
# - Egress zu Loki:3100 (Log-Push)
# - Egress zu K8s API:443 (Pod-Metadata fuer Labels)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-promtail-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    app.kubernetes.io/component: network-policy
    security.voeb/policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: promtail
  policyTypes:
    - Egress
  egress:
    # Loki Push (Port 3100)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: loki
      ports:
        - port: 3100
          protocol: TCP
    # K8s API (Pod-Metadata)
    - ports:
        - port: 443
          protocol: TCP
