# NetworkPolicy: Allow Kubernetes API Egress — Monitoring Namespace
#
# Erlaubt Egress zum Kubernetes API Server (Port 443).
# Noetig fuer:
# - prometheus-operator (CRD-Watches, ServiceMonitor, PrometheusRule)
# - kube-state-metrics (Cluster-State abfragen)
# - Prometheus (Service Discovery)
#
# Referenz: docs/referenz/monitoring-konzept.md (Phase 2.3)
# Anwendung: kubectl apply -f 05-allow-k8s-api-egress.yaml -n monitoring

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    app.kubernetes.io/component: network-policy
    security.voeb/policy-type: allow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
